name: HealthKitMCP
options:
  bundleIdPrefix: com.user
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  xcodeVersion: "15"
  settings:
    base:
      SWIFT_VERSION: "5.9"
packages:
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk
    from: "0.1.0"
schemes:
  HealthKitMCP:
    build:
      targets:
        HealthKitMCP: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  HealthKitMCP:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: HealthKitMCP
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.user.HealthKitMCP
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: HealthKitMCP/HealthKitMCP.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - package: swift-sdk
        product: MCP
    info:
      path: HealthKitMCP/Info.plist
      properties:
        CFBundleDisplayName: HealthKitMCP
        NSHealthShareUsageDescription: "HealthKitMCP reads your fitness data to answer questions from Claude."
        NSPrincipalClass: NSApplication
