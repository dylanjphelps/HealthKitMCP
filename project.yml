name: HealthKitMCP
options:
  bundleIdPrefix: com.user
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16"
  settings:
    base:
      SWIFT_VERSION: "5.9"
packages:
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk
    from: "0.1.0"
schemes:
  HealthKitMCP:
    build:
      targets:
        HealthKitMCP: all
        HealthKitMCPTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HealthKitMCPTests
    archive:
      config: Release
targets:
  HealthKitMCP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthKitMCP
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.user.HealthKitMCP
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - package: swift-sdk
        product: MCP
    entitlements:
      path: HealthKitMCP/HealthKitMCP.entitlements
    info:
      path: HealthKitMCP/Info.plist
      properties:
        CFBundleDisplayName: HealthKitMCP
        NSHealthShareUsageDescription: "HealthKit MCP reads your fitness data to answer questions from Claude."
        NSHealthUpdateUsageDescription: "HealthKit MCP schedules running workouts to your Apple Watch via Claude."
        NSLocalNetworkUsageDescription: "HealthKit MCP serves a local network API so Claude Desktop on your Mac can connect."
  HealthKitMCPTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthKitMCPTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HealthKitMCP
